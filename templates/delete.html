<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Updated Records</title>
    <link rel="stylesheet" href="static/history.css">
</head>
<body>
    <div class="container">
        <h2>Updated Records</h2>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Class</th>
                        <th class="text-right">Maths</th>
                        <th class="text-right">English</th>
                        <th class="text-right">Chemistry</th>
                        <th class="text-right">Total</th>
                    </tr>
                </thead>
                <tbody>
                    {% for row in record %}
                    <tr>
                        <td>{{ row[0] }}</td>
                        <td class="font-medium">{{ row[1] }}</td>
                        <td>{{ row[2] }}</td>
                        <td class="text-right numeric">{{ row[3] }}</td>
                        <td class="text-right numeric">{{ row[4] }}</td>
                        <td class="text-right numeric">{{ row[5] }}</td>
                        <td class="text-right numeric font-bold">{{ row[6] }}</td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="7" class="empty-state">No records remaining.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <div class="navigation-wrapper">
            <a href="/" id="back-home"><span class="arrow">←</span> Go Back Home</a>
        </div>
    </div>
</body>
</html>
