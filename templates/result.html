<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result — {{name}}</title>
    <link rel="stylesheet" href="static/another.css">
</head>
<body>
    <div class="container">
        <div class="title">Result Card</div>

        <div class="score-circle">
            <div class="score-label">Total</div>
            <div class="score-number">{{Toatal_number}}</div>
        </div>

        <div class="info">
            <span class="info-label">Student</span>
            <span class="info-value">{{name}}</span>
        </div>

        <div class="info">
            <span class="info-label">Class</span>
            <span class="info-value">{{class_1}}</span>
        </div>

        <form action="/history" method="POST">
            <button type="submit">View All Students →</button>
        </form>
    </div>
</body>
</html>
