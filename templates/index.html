<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student grade analyzer</title>
    <link rel="stylesheet" href="/static/design.css">
</head>
<body>
    <div class="container">
        <h1>Student Grade Analyzer</h1>
        
        <form action="/analyze" method="POST">
            <label>Enter your name</label>
            <input type="text" name="name" placeholder="Your name">
            
            <label>Enter your class</label>
            <input type="number" name="class" placeholder="Class number">
            
            <div>
                <h2>Enter Subject Marks</h2>
                
                <label>Maths</label>
                <input type="number" name="maths" placeholder="0/75">
                
                <label>English</label>
                <input type="number" name="english" placeholder="0/75">
                
                <label>Chemistry</label>
                <input type="number" name="chemistry" placeholder="0/75">
                </div>
                <div>
                    <button type="submit">Analyze Grades</button>
                </div>
            </div>
        </form>
    </div>
    <script>
    // This script catches the 'Enter' key and moves focus to the next input
    const inputs = document.querySelectorAll('input');
    inputs.forEach((input, index) => {
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault(); // Stop the form from submitting
                const next = inputs[index + 1];
                if (next) {
                    next.focus(); // Move to the next box
                } else {
                    input.form.submit(); // If it's the last box, submit!
                }
            }
        });
    });
</script>
</body>
</html>
