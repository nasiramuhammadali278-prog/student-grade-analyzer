<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Grade Analyzer</title>
    <link rel="stylesheet" href="/static/design.css">
</head>
<body>
    <div class="container">
        <h1>Student<br><span>Grade</span> Analyzer</h1>

        <form action="/analyze" method="POST">
            <label>Full Name</label>
            <input type="text" name="name" placeholder="e.g. Ahmed Khan" autocomplete="off">

            <label>Class / Grade</label>
            <input type="number" name="class" placeholder="e.g. 10">

            <h2>Subject Marks <small style="color:#3a3a5a;font-size:10px;margin-left:4px;">out of 75</small></h2>

            <div class="marks-grid">
                <div>
                    <label>Maths</label>
                    <input type="number" name="maths" placeholder="0–75" min="0" max="75">
                </div>
                <div>
                    <label>English</label>
                    <input type="number" name="english" placeholder="0–75" min="0" max="75">
                </div>
                <div>
                    <label>Chemistry</label>
                    <input type="number" name="chemistry" placeholder="0–75" min="0" max="75">
                </div>
            </div>

            <button type="submit">Analyze Grades →</button>
        </form>
    </div>

    <script>
        const inputs = document.querySelectorAll('input');
        inputs.forEach((input, index) => {
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const next = inputs[index + 1];
                    if (next) next.focus();
                    else input.form.submit();
                }
            });
        });
    </script>
</body>
</html>
